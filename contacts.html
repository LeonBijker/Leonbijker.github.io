<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Portfolio</title>
  <link rel="icon" href="pictures/lion.jpeg" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: darkgray; color: black; }
    .fade { transition: opacity 0.3s; opacity: 0; }
    .fade.show { opacity: 1; }
    .lang-toggle { cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark text-dark">
  <div class="container-fluid">
    <a class="navbar-brand lang" data-en="About Me" data-nl="Over mij" href="About me.html">About Me</a>
    <a class="navbar-brand" href="index.html"><b>Portfolio</b></a>
    <a class="navbar-brand lang" data-en="Contact" data-nl="Contact" href="#">Contact</a>
    <div class="ms-auto">
      <div class="dropdown">
        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">Language</button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#" onclick="setLanguage('en')">English</a></li>
          <li><a class="dropdown-item" href="#" onclick="setLanguage('nl')">Dutch</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-5 text-center">
  <p class="lang fade" data-en="Email: leonbijker6@gmail.com" data-nl="E-mail: leonbijker6@gmail.com">Email</p>
  <p class="lang fade">GitHub: <a href="https://github.com/LeonBijker" class="lang fade" data-en="GitHub" data-nl="GitHub">GitHub</a></p>
  <p class="lang fade">Unity: <a href="https://play.unity.com/en/user/42684632-b161-4e6f-bbc3-f6dd6521a784" class="lang fade" data-en="Unity" data-nl="Unity">Unity</a></p>

  <div class="mt-4">
    <a href="index.html" class="btn btn-primary lang fade" data-en="Go Back" data-nl="Ga Terug">Go Back</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function setLanguage(lang) {
  localStorage.setItem('lang', lang);
  document.querySelectorAll('.lang').forEach(el => {
    el.classList.remove('show');
    el.offsetWidth;
    el.textContent = el.getAttribute(`data-${lang}`);
    el.classList.add('show');
  });
}
document.addEventListener('DOMContentLoaded', () => {
  const savedLang = localStorage.getItem('lang') || 'en';
  setLanguage(savedLang);
});
</script>
</body>
</html>
