<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills - Portfolio</title>
  <link rel="icon" href="pictures/lion.jpeg" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: darkgray; color: black; }
    .fade { transition: opacity 0.3s; opacity: 0; }
    .fade.show { opacity: 1; }
    .lang-toggle { cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark text-dark">
  <div class="container-fluid">
    <a class="navbar-brand lang" data-en="About Me" data-nl="Over mij" href="About me.html">About Me</a>
    <a class="navbar-brand" href="index.html"><b>Portfolio</b></a>
    <a class="navbar-brand lang" data-en="Contact" data-nl="Contact" href="contacts.html">Contact</a>
    <div class="ms-auto">
      <div class="dropdown">
        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">Language</button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#" onclick="setLanguage('en')">English</a></li>
          <li><a class="dropdown-item" href="#" onclick="setLanguage('nl')">Dutch</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="mb-4">
    <h2 class="lang fade" data-en="HTML / CSS" data-nl="HTML / CSS">HTML / CSS</h2>
    <div class="progress mb-2">
      <div class="progress-bar" role="progressbar" style="width:65%"></div>
    </div>
    <img src="pictures/html-code.png" class="img-fluid" alt="HTML/CSS Code">
  </div>

  <div class="mb-4">
    <h2 class="lang fade" data-en="JavaScript" data-nl="JavaScript">JavaScript</h2>
    <div class="progress mb-2">
      <div class="progress-bar" role="progressbar" style="width:40%"></div>
    </div>
    <img src="pictures/javascript-code.png" class="img-fluid" alt="JavaScript Code">
  </div>

  <div class="mb-4">
    <h2 class="lang fade" data-en="Bootstrap" data-nl="Bootstrap">Bootstrap</h2>
    <div class="progress mb-2">
      <div class="progress-bar" role="progressbar" style="width:35%"></div>
    </div>
    <img src="pictures/bootstrap-code.png" class="img-fluid" alt="Bootstrap Code">
  </div>

  <div class="mb-4">
    <h2 class="lang fade" data-en="C#" data-nl="C#">C#</h2>
    <div class="progress mb-2">
      <div class="progress-bar" role="progressbar" style="width:80%"></div>
    </div>
    <img src="pictures/csharp-code.png" class="img-fluid" alt="C# Code">
  </div>

  <div class="mb-4">
    <h2 class="lang fade" data-en="PHP" data-nl="PHP">PHP</h2>
    <div class="progress mb-2">
      <div class="progress-bar" role="progressbar" style="width:20%"></div>
    </div>
    <img src="pictures/php-code.png" class="img-fluid" alt="PHP Code">
  </div>

  <div class="mb-4">
    <h2 class="lang fade" data-en="SQL" data-nl="SQL">SQL</h2>
    <div class="progress mb-2">
      <div class="progress-bar" role="progressbar" style="width:15%"></div>
    </div>
    <img src="pictures/sql-code.png" class="img-fluid" alt="SQL Code">
  </div>

  <div class="mb-4">
    <h2 class="lang fade" data-en="Mendix" data-nl="Mendix">Mendix</h2>
    <div class="progress mb-2">
      <div class="progress-bar" role="progressbar" style="width:50%"></div>
    </div>
  </div>

  <div class="text-center mt-4">
    <a href="index.html" class="btn btn-primary lang fade" data-en="Go Back" data-nl="Ga Terug">Go Back</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function setLanguage(lang) {
  localStorage.setItem('lang', lang);
  document.querySelectorAll('.lang').forEach(el => {
    el.classList.remove('show');
    el.offsetWidth;
    el.textContent = el.getAttribute(`data-${lang}`);
    el.classList.add('show');
  });
}
document.addEventListener('DOMContentLoaded', () => {
  const savedLang = localStorage.getItem('lang') || 'en';
  setLanguage(savedLang);
});
</script>
</body>
</html>
